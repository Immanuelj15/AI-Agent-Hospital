# docker-compose.yml
version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ayureg_backend
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite and Chroma database files on the host
      - ./backend/medicines.db:/app/backend/medicines.db
      - ./backend/chroma_store:/app/backend/chroma_store
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ayureg_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
